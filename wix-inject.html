<!--
  YUMI WILLEMS — WIX SITE REDESIGN INJECTION

  To install:
  1. Go to Wix Dashboard → Settings → Custom Code
  2. Click "+ Add Code"
  3. Paste everything between the <style> and </script> tags below
  4. Set placement: "Head"
  5. Set pages: "All pages"
  6. Save and publish

  This script:
  - Overrides all fonts, colors, and spacing
  - Hides the sci-fi hero banner on homepage
  - Restructures the layout to be minimal and clean
  - Applies to both HOME and ACHIEVEMENTS pages
-->

<script id="yumi-redesign-js">
// Wait for Wix page to fully render
(function() {
  function applyRedesign() {
    // Detect which page we're on
    const path = window.location.pathname;
    const isHome = path === '/' || path === '';
    const isMedia = path === '/media' || path.includes('/media');

    // FORCE remove all background images/colors from every section
    document.querySelectorAll('[id*="BG_"], [class*="FgquG"], [class*="LWbAav"], [class*="BmZ5pC"], [class*="sNF0_A"]').forEach(el => {
      el.style.cssText = 'background: transparent !important; background-image: none !important; opacity: 0 !important;';
    });

    // Remove all section background images
    document.querySelectorAll('.wixui-section, .wixui-column-strip, .wixui-column-strip__column').forEach(el => {
      el.style.backgroundColor = '#FEFDFB';
      el.style.backgroundImage = 'none';
      // Also target child BG containers
      el.querySelectorAll('div[id*="bg"], div[class*="bg"], wix-bg-media, wix-bg-image').forEach(bg => {
        bg.style.cssText = 'display: none !important;';
      });
    });

    // Force white background on the photo's parent container
    document.querySelectorAll('#comp-lr33l3ry, #comp-lr33l3rz, #comp-lr2tryo9').forEach(el => {
      el.style.cssText += '; background: #FEFDFB !important; background-image: none !important;';
      el.querySelectorAll('*').forEach(child => {
        const cs = getComputedStyle(child);
        if (cs.backgroundImage !== 'none' || cs.backgroundColor.includes('0, 0, 0') || cs.backgroundColor.includes('rgb(0') || cs.backgroundColor.includes('rgba(0')) {
          child.style.cssText += '; background: #FEFDFB !important; background-image: none !important;';
        }
      });
    });

    // Fix footer — remove dark background image
    document.querySelectorAll('#comp-lr2s4513, [id="SITE_FOOTER"], [id="SITE_FOOTER_WRAPPER"]').forEach(el => {
      el.style.cssText += '; background: #FEFDFB !important; background-image: none !important;';
      el.querySelectorAll('*').forEach(child => {
        child.style.backgroundImage = 'none';
        child.style.backgroundColor = '#FEFDFB';
      });
    });

    // --- HOMEPAGE MODIFICATIONS ---
    if (isHome) {
      // Update the hero title text
      const heroTitle = document.querySelector('#comp-lr2rahfa');
      if (heroTitle) {
        const h2 = heroTitle.querySelector('h2, h1') || heroTitle;
        if (h2 && h2.textContent.includes("Blog")) {
          // Find the span inside and update
          const spans = h2.querySelectorAll('span');
          spans.forEach(s => {
            if (s.textContent.includes("Blog")) {
              s.textContent = "Yumi Willems";
            }
          });
        }
      }

      // Update the subtitle
      const heroSub = document.querySelector('#comp-lr2rahfc');
      if (heroSub) {
        const spans = heroSub.querySelectorAll('span');
        spans.forEach(s => {
          if (s.textContent.includes("Welcome to my personal blog")) {
            s.textContent = "CEO & Co-Founder of LEAD.app · Columbia University (IKNS) · Writing on knowledge management, people analytics, and enterprise AI";
          }
        });
      }
    }

    // --- ACHIEVEMENTS PAGE MODIFICATIONS ---
    if (isMedia) {
      // Update page heading
      const careerHeading = document.querySelector('#comp-lr45dmeb7');
      if (careerHeading) {
        const el = careerHeading.querySelector('h2, span') || careerHeading;
        // Keep "My Career Story" as is — it's good
      }
    }

    // --- BOTH PAGES: Update footer year ---
    const footer = document.querySelector('#comp-lr2w9g25');
    if (footer) {
      const spans = footer.querySelectorAll('span');
      spans.forEach(s => {
        if (s.textContent.includes('2024')) {
          s.textContent = s.textContent.replace('2024', '2026');
        }
      });
    }
  }

  // Run after page loads (Wix renders async)
  if (document.readyState === 'complete') {
    setTimeout(applyRedesign, 1000);
  } else {
    window.addEventListener('load', function() {
      setTimeout(applyRedesign, 1500);
    });
  }

  // Also run on Wix page transitions (SPA navigation)
  const observer = new MutationObserver(function(mutations) {
    for (const m of mutations) {
      if (m.type === 'childList' && m.addedNodes.length > 0) {
        setTimeout(applyRedesign, 500);
        break;
      }
    }
  });

  const container = document.querySelector('#PAGES_CONTAINER');
  if (container) {
    observer.observe(container, { childList: true, subtree: false });
  }
})();
</script>
